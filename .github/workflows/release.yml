name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.25
        with:
          cuda: "12.8.0"
          method: network

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release binaries
        run: cargo build --release -p mogfish-annotator-cli -p mogfish-classify

      - name: Build .deb package
        run: cargo deb -p mogfish-annotator-cli --no-build

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: mogfish-deb
          path: target/debian/*.deb

  create-release:
    needs: build-linux
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: mogfish-deb
          path: dist/

      - name: Download model from existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist/model
          # Model files are uploaded once and reused across releases.
          # If this is the first release, upload them manually first:
          #   gh release create v0.1.0-model --repo AFDudley/mogfish \
          #     model-0.uqff residual.safetensors config.json ...
          # Then subsequent releases reference them.

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "${TAG}" \
            --title "mogfish ${TAG}" \
            --generate-notes \
            dist/*.deb
