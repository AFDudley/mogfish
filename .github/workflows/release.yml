name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux-cpu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release binaries (CPU-only)
        run: cargo build --release -p mogfish-annotator-cli -p mogfish-classify

      - name: Build .deb package
        run: cargo deb -p mogfish-annotator-cli --no-build

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: mogfish-deb-cpu
          path: target/debian/*.deb

  build-linux-cuda:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.25
        with:
          cuda: "12.8.0"
          method: network

      - name: Build release binaries (CUDA)
        run: cargo build --release -p mogfish-annotator-cli -p mogfish-classify --features mogfish-engine-mistralrs/cuda

      - name: Package CUDA binary
        run: |
          mkdir -p dist
          cp target/release/mogfish-annotate dist/mogfish-annotate-cuda
          cp target/release/mogfish-classify dist/

      - name: Upload CUDA artifact
        uses: actions/upload-artifact@v4
        with:
          name: mogfish-cuda
          path: dist/

  create-release:
    needs: [build-linux-cpu, build-linux-cuda]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download CPU .deb
        uses: actions/download-artifact@v4
        with:
          name: mogfish-deb-cpu
          path: dist/

      - name: Download CUDA binary
        uses: actions/download-artifact@v4
        with:
          name: mogfish-cuda
          path: dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "${TAG}" \
            --title "mogfish ${TAG}" \
            --generate-notes \
            dist/*
